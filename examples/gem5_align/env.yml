# Head-node conda environment for the gem5_align alignment loop.
#
# This is the env on the machine where you run `python -m chia.cli.main up` and
# `ray job submit` (the head). Workers do NOT use it: the loop ships chia to
# them via Ray py_modules, and they run inside the docker images named in
# cluster.yaml. Only the head needs this env.
#
# Design: get Ray, grpcio, and ALL of chia's dependencies from pip (via an
# editable install of this repo's chia). There is deliberately NO conda `ray`
# package. Mixing conda-forge ray/grpcio with pip ray is what crashes Ray's
# dashboard agent and breaks `ray job submit` with a 504 — the agent needs the
# pip grpcio build (>=1.63), not conda-forge grpcio 1.62.2.
#
# Create it FROM THIS DIRECTORY — the `-e ../..` path resolves relative to your
# shell's cwd, not to this file:
#
#   cd <repo>/chia/examples/gem5_align
#   conda env create -f env.yml
#   conda activate gem5-align
#
# (Equivalently, from anywhere: `pip install -e /abs/path/to/repo/chia[tensorboard]`
#  into a fresh `python=3.10` env, then `pip install grpcio==1.81.0`.)

name: gem5-align

channels:
  - conda-forge
  - ucb-bar

dependencies:
  - python=3.10.19
  - pip
  - riscv-tools
  - make
  - pip:
      # chia + all its declared deps (ray[default]==2.54.0, mcp,
      # pydantic, fastapi, boto3, …), editable against this repo so chia.__path__
      # points at the source the loop ships via py_modules. The [tensorboard]
      # extra adds the metrics backend the loop uses
      # (config.METRICS_CONFIG backend="tensorboard").
      - -e ../..[tensorboard]
      # ray pulls grpcio transitively, but pin the known-good build explicitly:
      # this is the dashboard-agent-compatible version (matches the proven head
      # env). Relax to `grpcio>=1.66` if you need a newer one.
      - grpcio==1.81.0