# Conda env for driving the circtissues example cluster.
#
# Install on the single HOST (the head + dev box) so you can run `chia up` and
# the loop from there:
#
#     conda env create -f env.yml
#     conda activate circtissues
#     export GITHUB_TOKEN=...                      # read-only issue/PR fetch
#     export CHIA_HEAD=$(hostname)                 # host to bring the cluster up on
#     chia up cluster.yaml
#     ./fix_issues_submit.sh --max-issues 2
#
# The `-e ../..` editable install points at the chia repo root (this example
# lives at <repo>/examples/circt_issue_solver, so ../.. is <repo>).
name: circtissues
channels:
  - conda-forge
dependencies:
  - python =3.10.19
  - pip
  - pip:
    - "ray[default]==2.54.0"
    - pyyaml
    - boto3
    - -e ../..
