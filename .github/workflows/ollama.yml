name: Ollama Image

on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/ucb-bar/chia-ollama

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # One image per GPU vendor: NVIDIA/CPU and AMD (ROCm) cannot share a base
    # (CUDA vs ROCm runtimes), so the OllamaDockerfile parameterizes OLLAMA_BASE
    # and we build both variants from it. `tag_suffix: ""` -> :latest (NVIDIA is
    # the default/safe build); `rocm` -> :rocm.
    strategy:
      fail-fast: false
      matrix:
        include:
          - ollama_base: ollama/ollama:latest
            tag_suffix: ""
          - ollama_base: ollama/ollama:rocm
            tag_suffix: rocm

    steps:
      # GitHub-hosted runners come with ~14 GB free; the ollama base (CUDA/ROCm
      # libs) plus the chia install is large, so we
      # evict what isn't needed for this build (mirrors the other nightlies).
      - name: Show disk before cleanup
        run: df -h

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache || true
          sudo rm -rf /usr/lib/jvm || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/local/julia* || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /opt/microsoft /opt/google || true
          sudo rm -rf /opt/az || true
          sudo rm -rf /usr/local/share/powershell || true
          docker image prune -af || true
          docker builder prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Per-variant tags. The empty suffix maps to bare :latest / :build-<id>;
      # otherwise the suffix is appended (e.g. :rocm / :rocm-build-<id>). Done
      # in a step (not inline) so the empty-suffix case stays clean.
      #
      # `tags` is multi-line (two tags), so it MUST use $GITHUB_OUTPUT's heredoc
      # form: a plain `key=val` line only accepts single-line values, and the
      # second tag would be parsed as its own (invalid) key=value line.
      - name: Compute tags
        id: tags
        run: |
          sfx="${{ matrix.tag_suffix }}"
          if [ -z "$sfx" ]; then
            rolling="${IMAGE}:latest"
            dated="${IMAGE}:build-${{ github.run_id }}"
            cache="${IMAGE}:buildcache"
          else
            rolling="${IMAGE}:${sfx}"
            dated="${IMAGE}:${sfx}-build-${{ github.run_id }}"
            cache="${IMAGE}:${sfx}-buildcache"
          fi
          {
            echo "tags<<TAGS_EOF"
            echo "$rolling"
            echo "$dated"
            echo "TAGS_EOF"
            echo "cache=$cache"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: dockerfiles/OllamaDockerfile
          context: .
          push: true
          build-args: |
            OLLAMA_BASE=${{ matrix.ollama_base }}
          tags: ${{ steps.tags.outputs.tags }}
          # Separate buildcache per variant so the NVIDIA and ROCm bases don't
          # clobber each other's layers.
          cache-from: type=registry,ref=${{ steps.tags.outputs.cache }}
          cache-to: type=registry,ref=${{ steps.tags.outputs.cache }},mode=max

      - name: Show runner resources
        run: |
          free -h
          df -h
          docker system df || true

  cleanup-old-builds:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      packages: write
    steps:
      - name: Delete build images older than 7 days
        uses: actions/delete-package-versions@v5
        with:
          package-name: chia-ollama
          package-type: container
          min-versions-to-keep: 0
          delete-only-pre-release-versions: false
          token: ${{ secrets.GITHUB_TOKEN }}
          # Keep the rolling tags (:latest, :rocm, :*-buildcache); only prune the
          # dated build-* tags (both bare and rocm-prefixed) once they age out.
          ignore-versions: "^(?!(build-|rocm-build-)).*$"
          min-days-old: 7
