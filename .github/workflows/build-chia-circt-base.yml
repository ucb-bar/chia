name: Build CIRCT Base Image

# The base image bakes the slow CIRCT build (~30 min single-core) + sbt,
# JDK, and the chia interpreter / ray pin. We only need to rebuild it when
# the base Dockerfile itself changes (or you bump a pinned arg). The thin
# child image (chia-circt) rebuilds from this base in seconds.

on:
  workflow_dispatch:           # manual trigger only — base rebuilds are slow
                               # (~30 min) and rare; fire from the GH UI when
                               # you bump a pin in ChiaCirctBaseDockerfile.

env:
  IMAGE: ghcr.io/ucb-bar/chia-circt-base

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # GitHub-hosted runners come with ~14 GB free; CIRCT's source build
      # is ~5 GB and the install set is another few GB. Evict the bundled
      # languages we don't need (same set as the other nightlies).
      - name: Show disk before cleanup
        run: df -h

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache || true
          sudo rm -rf /usr/lib/jvm || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/local/julia* || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /opt/microsoft /opt/google || true
          sudo rm -rf /opt/az || true
          sudo rm -rf /usr/local/share/powershell || true
          docker image prune -af || true
          docker builder prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: dockerfiles/ChiaCirctBaseDockerfile
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:run-${{ github.run_id }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Show runner resources
        run: |
          free -h
          df -h
          docker system df || true
