name: ESP Image

# Builds dockerfiles/EspDockerfile
# (FROM columbiasld/esp:ubuntu18-full on public Docker Hub, so no PAT /
# BuildKit secret is needed; GHCR login is only for the push).

on:
  workflow_dispatch:
  push:
    branches: [esp]

env:
  IMAGE: ghcr.io/ucb-bar/chia-esp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Show disk before cleanup
        run: df -h

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache || true
          sudo rm -rf /usr/lib/jvm || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/local/julia* || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /opt/microsoft /opt/google || true
          sudo rm -rf /opt/az || true
          sudo rm -rf /usr/local/share/powershell || true
          docker image prune -af || true
          docker builder prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: dockerfiles/EspDockerfile
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
          no-cache: true

      - name: Show runner resources
        run: |
          free -h
          df -h
          docker system df || true
