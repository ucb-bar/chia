name: Chia Image

on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/ucb-bar/chia

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # GitHub-hosted runners come with ~14 GB free; the chia install pulls
      # dependencies, so we evict stuff that isn't needed for this
      # build (mirrors the other nightlies).
      - name: Show disk before cleanup
        run: df -h

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache || true
          sudo rm -rf /usr/lib/jvm || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/local/julia* || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /opt/microsoft /opt/google || true
          sudo rm -rf /opt/az || true
          sudo rm -rf /usr/local/share/powershell || true
          docker image prune -af || true
          docker builder prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      # Needed to cross-build the arm64 variant on the amd64 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: dockerfiles/ChiaDockerfile
          context: .
          # Apple-silicon Macs must not fall back to Rosetta emulation: the
          # Ray agents crash under it on the first task, killing the node.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:build-${{ github.run_id }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Show runner resources
        run: |
          free -h
          df -h
          docker system df || true

  cleanup-old-builds:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      packages: write
    steps:
      - name: Delete build images older than 7 days
        uses: actions/delete-package-versions@v5
        with:
          package-name: chia
          package-type: container
          min-versions-to-keep: 0
          delete-only-pre-release-versions: false
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore-versions: "^(?!build-).*$"
          min-days-old: 7
