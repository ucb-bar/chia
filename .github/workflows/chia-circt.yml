name: CIRCT Image

# Thin child of ghcr.io/ucb-bar/chia-circt-base — only does
# COPY chia + pip install -e /workspace/chia on top of the base. The
# slow CIRCT build (~30 min) is baked into the base image (rebuilt
# separately by build-chia-circt-base.yml when the base Dockerfile
# changes), so this build finishes in a couple of minutes.

on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/ucb-bar/chia-circt

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: dockerfiles/ChiaCirctDockerfile
          context: .
          # Always fetch the latest chia-circt-base — a base rebuild from
          # build-chia-circt-base.yml should propagate to the next build.
          pull: true
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:build-${{ github.run_id }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Show runner resources
        run: |
          free -h
          df -h
          docker system df || true

  cleanup-old-builds:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      packages: write
    steps:
      - name: Delete build images older than 7 days
        uses: actions/delete-package-versions@v5
        with:
          package-name: chia-circt
          package-type: container
          min-versions-to-keep: 0
          delete-only-pre-release-versions: false
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore-versions: "^(?!build-).*$"
          min-days-old: 7
