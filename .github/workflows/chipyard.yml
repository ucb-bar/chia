name: Chipyard Image

# Builds dockerfiles/ChipyardDockerfile
# (FROM ghcr.io/ucb-bar/chia, cloning the public ucb-bar/chipyard). No PAT /
# BuildKit secret is needed since the chipyard repo is public.

on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/ucb-bar/chia-chisel-build

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Show disk before cleanup
        run: df -h

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache || true
          sudo rm -rf /usr/lib/jvm || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/local/julia* || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /opt/microsoft /opt/google || true
          sudo rm -rf /opt/az || true
          sudo rm -rf /usr/local/share/powershell || true
          docker image prune -af || true
          docker builder prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login is still required: the base image (ghcr.io/ucb-bar/chia) is a
      # private GHCR package even though the chipyard source is public.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: dockerfiles/ChipyardDockerfile
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
          no-cache: true
          # cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          # cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Show runner resources
        run: |
          free -h
          df -h
          docker system df || true
