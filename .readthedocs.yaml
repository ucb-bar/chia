# Read the Docs build configuration.
# Modeled on the FireSim repo's setup (https://github.com/firesim/firesim).
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

formats:
  - pdf
  - htmlzip
  - epub
